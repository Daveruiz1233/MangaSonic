name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build & Release IPA
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      - name: Build unsigned iOS IPA
        run: |
          flutter build ios --release --no-codesign
          mkdir -p Payload
          mv build/ios/iphoneos/Runner.app Payload/
          zip -r ios-release.ipa Payload/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: Release ${{ github.ref_name }}
          body: |
            ## 🚀 Manga Sonic ${{ github.ref_name }}

            ### Reader
            - Seamless infinite scrolling between chapters (both directions)
            - Pixel-perfect "Continue Reading" position restore
            - Aggressive image caching with 6000px pre-render zone
            - Offline-first reading from downloaded chapters
            - Chapter separators and page counter overlay

            ### Library & Tracking
            - Categorized manga shelves
            - Automatic read/unread progress tracking
            - Per-page scroll position persistence

            ### Download Manager
            - Parallel downloads (3 manga × 4 chapters = 12 concurrent threads)
            - Persistent queue with auto-resume on reconnect
            - Multi-select bulk management with per-manga grouping

            ### Sources
            - ManhuaTop (HTML scraping)
            - AsuraComic (RSC payload parsing)
            - ManhuaPlus (HTML scraping)

            ### Customization
            - Pure dark-mode UI with palette extraction
            - Reader color filters, brightness, and image adjustments

            ---
            📦 **iOS:** Unsigned IPA provided for sideloading via AltStore/Sideloadly.
          files: ios-release.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
