name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build & Release IPA
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      - name: Build unsigned iOS IPA
        run: |
          flutter build ios --release --no-codesign
          mkdir -p Payload
          mv build/ios/iphoneos/Runner.app Payload/
          zip -r ios-release.ipa Payload/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: Release ${{ github.ref_name }}
          body: |
            ## 🚀 Manga Sonic ${{ github.ref_name }}

            ### UI & Experience
            - Sleek "Title-on-Cover" Library grid with gradient overlays
            - Dynamic Hero Card for "Recently Read" with automatic palette extraction
            - Transparent adaptive AppBars across all screens
            - Consistent source tagging and migration sheet styling

            ### Features & Stability
            - Background scanning for automatic "NEW" chapter tagging
            - Intelligent grid deduplication (Hero Card vs Grid)
            - Reimagined Download Manager with interactive Hero Cards
            - Multi-select manual management for downloads and library
            - Fixed selection/cancellation edge cases in Download Manager

            ---
            📦 **iOS:** Unsigned IPA provided for sideloading via AltStore/Sideloadly.
          files: ios-release.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
