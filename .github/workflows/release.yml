name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build & Release IPA
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      - name: Build unsigned iOS IPA
        run: |
          flutter build ios --release --no-codesign
          mkdir -p Payload
          mv build/ios/iphoneos/Runner.app Payload/
          zip -r ios-release.ipa Payload/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: Release ${{ github.ref_name }}
          body: |
            ### 🚀 New Features & Optimizations
            
            - **Seamless Infinite Scroll:** Transitioning between chapters is now 100% seamless. The reader continuously appends and prepends chapters to an infinite scrolling view, complete with pixel-perfect scroll position restoration.
            - **Aggressive Cross-Chapter Prefetching (True Gapless Reading):**
              - Vastly expanded the memory cache boundary to cache 5-10 pages ahead and behind at all times.
              - The reader now silently fetches the next/previous chapters long before you reach the edge of the current one.
            - **Instant Offline Reading:** When reading a downloaded chapter, the app will instantly search storage for adjacent chapters and pre-load them into memory in the background, making offline transitions instantaneous.
            
            ### 📦 Build Info
            - **iOS:** Unsigned IPA package provided for sideloading.
          files: ios-release.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
