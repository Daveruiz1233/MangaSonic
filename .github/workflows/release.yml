name: Build and Release

on:
  push:
    tags:
      - 'v*' # Push events to matching v*, i.e. v1.0, v20.15.10

permissions:
  contents: write

jobs:
  build-and-release:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: android
            artifact_name: app-release.apk
            artifact_path: build/app/outputs/flutter-apk/app-release.apk
          - os: macos-latest
            platform: ios
            artifact_name: ios-release.ipa
            artifact_path: build/ios/ipa/*.ipa
          - os: windows-latest
            platform: windows
            artifact_name: windows-release.zip
            artifact_path: build/windows/x64/runner/Release/*

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java (Android only)
        if: matrix.platform == 'android'
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Flutter Pub Get
        run: flutter pub get

      - name: Build Android APK
        if: matrix.platform == 'android'
        run: flutter build apk --release

      - name: Build Windows EXE
        if: matrix.platform == 'windows'
        run: |
          flutter build windows --release
          cd build/windows/x64/runner/Release/
          Compress-Archive -Path * -DestinationPath ../../../../../windows-release.zip

      - name: Build iOS IPA
        if: matrix.platform == 'ios'
        run: |
          # Note: Creating an IPA usually requires a signing certificate and provisioning profile.
          # This builds an unsigned app payload as a fallback if signing isn't configured.
          flutter build ios --release --no-codesign
          mkdir -p Payload
          mv build/ios/iphoneos/Runner.app Payload/
          zip -r ios-release.ipa Payload/

      - name: Release Artifacts
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            ${{ matrix.platform == 'windows' && 'windows-release.zip' || matrix.artifact_path }}
            ${{ matrix.platform == 'ios' && 'ios-release.ipa' || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
